<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thermal Image Classifier</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 6px;
      color: #ff7a18;
    }

    p.sub {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .drop-zone {
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: all 0.3s ease;
    }

    .drop-zone:hover {
      border-color: #ff7a18;
      background: rgba(255,122,24,0.08);
    }

    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    #preview-wrap {
      display: none;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    #preview-img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff7a18, #ffb347);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    button:hover { transform: scale(1.02); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      display: none;
      margin-top: 22px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .label-emoji { font-size: 2.5rem; }

    .label-name {
      font-size: 2rem;
      font-weight: 700;
    }

    .Cold { color: #4da6ff; }
    .Normal { color: #ffd966; }
    .Hot { color: #ff4d4d; }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric {
      background: rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 10px;
    }

    .m-label {
      font-size: 0.75rem;
      color: #aaa;
      margin-bottom: 5px;
    }

    .m-value {
      font-size: 1.3rem;
      font-weight: bold;
    }

    #error-msg {
      display: none;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,0,0,0.1);
      color: #ff6b6b;
    }

    footer {
      margin-top: 30px;
      font-size: 0.75rem;
      color: #666;
    }
  </style>
</head>

<body>

  <h1>🔥 ThermoScan</h1>
  <p class="sub">AI-powered Thermal Image Analysis</p>

  <div class="card">

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div>📁 Click or Drag Image</div>
    </div>

    <div id="preview-wrap">
      <img id="preview-img">
    </div>

    <button id="analyze-btn" disabled>Analyze Image</button>

    <div id="error-msg"></div>

    <div id="result">
      <div class="label-row">
        <div id="res-emoji"></div>
        <div id="res-label" class="label-name"></div>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="m-label">Temperature</div>
          <div id="res-temp" class="m-value"></div>
        </div>

        <div class="metric">
          <div class="m-label">Intensity</div>
          <div id="res-intensity" class="m-value"></div>
        </div>
      </div>
    </div>

  </div>

  <footer>Built with Flask + AI + DevOps Monitoring</footer>

<script>
const input = document.getElementById("file-input");
const preview = document.getElementById("preview-img");
const previewWrap = document.getElementById("preview-wrap");
const btn = document.getElementById("analyze-btn");

let file = null;

input.addEventListener("change", () => {
  file = input.files[0];
  preview.src = URL.createObjectURL(file);
  previewWrap.style.display = "block";
  btn.disabled = false;
});

btn.addEventListener("click", async () => {
  btn.innerHTML = "<span class='spinner'></span>Analyzing...";
  btn.disabled = true;

  const fd = new FormData();
  fd.append("image", file);

  try {
    const res = await fetch("/predict", { method: "POST", body: fd });
    const data = await res.json();

    document.getElementById("res-emoji").textContent =
      data.label === "Hot" ? "🔴" :
      data.label === "Cold" ? "🔵" : "🟡";

    const label = document.getElementById("res-label");
    label.textContent = data.label;
    label.className = "label-name " + data.label;

    document.getElementById("res-temp").textContent =
      data.temperature.toFixed(2) + " °C";

    document.getElementById("res-intensity").textContent =
      data.avg_intensity.toFixed(1);

    document.getElementById("result").style.display = "block";

  } catch {
    document.getElementById("error-msg").style.display = "block";
    document.getElementById("error-msg").textContent = "Error processing image";
  }

  btn.innerHTML = "Analyze Image";
  btn.disabled = false;
});
</script>

</body>
</html>

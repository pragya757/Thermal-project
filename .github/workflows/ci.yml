name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # Security check
      - name: Security Check
        run: |
          pip install safety
          safety check || true

      # Build Docker image
      - name: Build Docker Image
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          docker build -t thermal-app .

      # Slack notification
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"CI/CD Pipeline completed for Thermal Project 🚀"}' \
          $SLACK_WEBHOOK
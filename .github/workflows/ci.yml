name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Install Dependencies
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # 4️⃣ Security Check
      - name: Security Check
        run: |
          pip install safety
          safety check || true

      # 5️⃣ Install Docker & Build Image
      - name: Build Docker Image
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          docker build -t thermal-app .

      # 6️⃣ Slack Notification
      - name: Notify Slack
        if: always()
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data '{"text":"CI/CD Pipeline completed for Thermal Project 🚀"}' \
          "${{ secrets.SLACK_WEBHOOK }}"